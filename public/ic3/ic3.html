   <body>
     <h1>This is the Main Heading</h1>
     <p>A paragraph introduces the page and tells the reader what it's about.</p>

     <h2>This is a Sub-Heading</h2>
     <p>Sub-headings break a page into sections. This paragraph belongs to that section.</p>

     <h3>A Smaller Sub-Heading</h3>
     <p>Headings go from h1 (biggest, one per page) down to h6 (smallest).</p>
   </body>
